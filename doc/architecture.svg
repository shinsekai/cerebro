<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="'SF Pro Display','Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="orchGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="wsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="hitlGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrYellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#d29922" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#f85149" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" rx="16" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="958" height="818" rx="15" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="600" letter-spacing="0.5">Cerebro — 2-Tier AI Mesh Architecture</text>
  <text x="480" y="62" text-anchor="middle" fill="#8b949e" font-size="12">Enterprise Multi-Agent Orchestration Platform</text>

  <!-- ═══════════════ TIER LABELS (left side) ═══════════════ -->
  <text x="20" y="118" fill="#484f58" font-size="10" font-weight="500" letter-spacing="2" transform="rotate(-90,20,118)">INTERFACE</text>
  <text x="20" y="262" fill="#484f58" font-size="10" font-weight="500" letter-spacing="2" transform="rotate(-90,20,262)">ENGINE</text>
  <text x="20" y="498" fill="#484f58" font-size="10" font-weight="500" letter-spacing="2" transform="rotate(-90,20,498)">AGENTS</text>
  <text x="20" y="720" fill="#484f58" font-size="10" font-weight="500" letter-spacing="2" transform="rotate(-90,20,720)">DATA</text>

  <!-- ═══════════════ DEVELOPER CLI ═══════════════ -->
  <rect x="180" y="85" width="600" height="50" rx="10" fill="url(#cliGrad)" opacity="0.15" stroke="#58a6ff" stroke-width="0.5"/>
  <rect x="195" y="96" width="24" height="28" rx="4" fill="#58a6ff" opacity="0.25"/>
  <text x="207" y="115" text-anchor="middle" fill="#58a6ff" font-size="14">⌘</text>
  <text x="232" y="108" fill="#e6edf3" font-size="14" font-weight="600">Developer CLI</text>
  <text x="232" y="124" fill="#8b949e" font-size="11">@clack/prompts · picocolors · SSE stream consumer</text>
  <text x="652" y="108" fill="#58a6ff" font-size="11" font-weight="500">develop</text>
  <text x="652" y="123" fill="#8b949e" font-size="10">fix · review · ops</text>
  <rect x="638" y="95" width="2" height="32" rx="1" fill="#58a6ff" opacity="0.4"/>

  <!-- Arrow: CLI → Engine -->
  <line x1="480" y1="135" x2="480" y2="165" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrBlue)" opacity="0.7"/>
  <text x="494" y="155" fill="#58a6ff" font-size="9" opacity="0.8">POST /mesh/loop</text>

  <!-- ═══════════════ ENGINE (Hono API) ═══════════════ -->
  <rect x="100" y="168" width="760" height="186" rx="12" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
  <text x="120" y="190" fill="#7c3aed" font-size="13" font-weight="600">Cerebro Engine</text>
  <text x="252" y="190" fill="#8b949e" font-size="11">Hono v4 · Bun Runtime · SSE Streaming · Port 8080</text>

  <!-- Workspace Context Scanner -->
  <rect x="120" y="202" width="220" height="64" rx="8" fill="url(#wsGrad)" opacity="0.12" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="136" y="222" fill="#c4b5fd" font-size="12" font-weight="500">Workspace Context Engine</text>
  <text x="136" y="238" fill="#8b949e" font-size="10">Stack detection · Tree builder</text>
  <text x="136" y="252" fill="#8b949e" font-size="10">File selector · pgvector search</text>

  <!-- Orchestrator (Tier 1) -->
  <rect x="370" y="202" width="220" height="64" rx="8" fill="url(#orchGrad)" opacity="0.15" stroke="#f97316" stroke-width="0.5"/>
  <text x="386" y="222" fill="#fb923c" font-size="12" font-weight="500">Tier 1 · Orchestrator</text>
  <text x="386" y="238" fill="#8b949e" font-size="10">Claude Opus 4.6 · Zero temperature</text>
  <text x="386" y="252" fill="#8b949e" font-size="10">Plans → ExecutionPlan (Zod)</text>

  <!-- Circuit Breaker -->
  <rect x="620" y="202" width="220" height="64" rx="8" fill="url(#cbGrad)" opacity="0.12" stroke="#ef4444" stroke-width="0.5"/>
  <text x="636" y="222" fill="#fca5a5" font-size="12" font-weight="500">Circuit Breaker</text>
  <text x="636" y="238" fill="#8b949e" font-size="10">Max 3 retries · StateTicket</text>
  <text x="636" y="252" fill="#8b949e" font-size="10">Halts on cascading failures</text>

  <!-- SSE Stream bar -->
  <rect x="120" y="280" width="720" height="30" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="136" y="299" fill="#3fb950" font-size="11" font-weight="500">▸ SSE Stream</text>
  <text x="230" y="299" fill="#8b949e" font-size="10">agent_started → tool_call → tool_result → approval_request → done</text>
  <rect x="688" y="286" width="8" height="8" rx="4" fill="#3fb950" opacity="0.8"/>
  <rect x="688" y="286" width="8" height="8" rx="4" fill="#3fb950" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="702" y="299" fill="#3fb950" font-size="10">LIVE</text>

  <!-- HITL Approval -->
  <rect x="120" y="320" width="720" height="28" rx="6" fill="url(#hitlGrad)" opacity="0.08" stroke="#d29922" stroke-width="0.5"/>
  <text x="136" y="339" fill="#d29922" font-size="11" font-weight="500">⏸ Human-in-the-Loop</text>
  <text x="290" y="339" fill="#8b949e" font-size="10">File preview · Selective approval · Reject with reason · 5 min timeout</text>

  <!-- Arrow: Engine → Agent Mesh -->
  <line x1="480" y1="354" x2="480" y2="384" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrGreen)" opacity="0.7"/>
  <text x="494" y="375" fill="#3fb950" font-size="9" opacity="0.8">dispatch plan</text>

  <!-- ═══════════════ TIER 2: AGENT MESH ═══════════════ -->
  <rect x="50" y="387" width="860" height="220" rx="12" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
  <text x="70" y="410" fill="#10b981" font-size="13" font-weight="600">Tier 2 · Specialized Agent Mesh</text>
  <text x="310" y="410" fill="#8b949e" font-size="11">Claude Sonnet 4.6 · Agentic Tool Loop · Max 15 iterations</text>

  <!-- Agent cards -->
  <!-- Frontend -->
  <rect x="70" y="425" width="125" height="58" rx="8" fill="url(#agentGrad)" opacity="0.12" stroke="#10b981" stroke-width="0.5"/>
  <text x="132" y="448" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Frontend</text>
  <text x="132" y="463" text-anchor="middle" fill="#8b949e" font-size="9">UI · WCAG · SSR</text>
  <circle cx="85" cy="446" r="3" fill="#10b981" opacity="0.6"/>

  <!-- Backend -->
  <rect x="210" y="425" width="125" height="58" rx="8" fill="url(#agentGrad)" opacity="0.12" stroke="#10b981" stroke-width="0.5"/>
  <text x="272" y="448" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Backend</text>
  <text x="272" y="463" text-anchor="middle" fill="#8b949e" font-size="9">API · SOLID · ORM</text>
  <circle cx="225" cy="446" r="3" fill="#10b981" opacity="0.6"/>

  <!-- Quality -->
  <rect x="350" y="425" width="125" height="58" rx="8" fill="url(#agentGrad)" opacity="0.12" stroke="#10b981" stroke-width="0.5"/>
  <text x="412" y="448" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Quality</text>
  <text x="412" y="463" text-anchor="middle" fill="#8b949e" font-size="9">AST · Biome · Lint</text>
  <circle cx="365" cy="446" r="3" fill="#10b981" opacity="0.6"/>

  <!-- Security -->
  <rect x="490" y="425" width="125" height="58" rx="8" fill="url(#agentGrad)" opacity="0.12" stroke="#10b981" stroke-width="0.5"/>
  <text x="552" y="448" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Security</text>
  <text x="552" y="463" text-anchor="middle" fill="#8b949e" font-size="9">OWASP · XSS · Zod</text>
  <circle cx="505" cy="446" r="3" fill="#10b981" opacity="0.6"/>

  <!-- Tester -->
  <rect x="630" y="425" width="125" height="58" rx="8" fill="url(#agentGrad)" opacity="0.12" stroke="#10b981" stroke-width="0.5"/>
  <text x="692" y="448" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Tester</text>
  <text x="692" y="463" text-anchor="middle" fill="#8b949e" font-size="9">Jest · Coverage</text>
  <circle cx="645" cy="446" r="3" fill="#10b981" opacity="0.6"/>

  <!-- Ops -->
  <rect x="770" y="425" width="120" height="58" rx="8" fill="url(#agentGrad)" opacity="0.12" stroke="#10b981" stroke-width="0.5"/>
  <text x="830" y="448" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Ops</text>
  <text x="830" y="463" text-anchor="middle" fill="#8b949e" font-size="9">Docker · CI/CD</text>
  <circle cx="785" cy="446" r="3" fill="#10b981" opacity="0.6"/>

  <!-- Tool Use Box -->
  <rect x="70" y="500" width="820" height="95" rx="8" fill="url(#toolGrad)" opacity="0.06" stroke="#06b6d4" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="86" y="520" fill="#67e8f9" font-size="11" font-weight="500">Agentic Tool Loop</text>
  <text x="205" y="520" fill="#8b949e" font-size="10">Each agent iterates: read → search → write → verify → complete</text>

  <!-- Tool icons in a row -->
  <g transform="translate(86,532)">
    <rect width="110" height="28" rx="6" fill="#0d1117" stroke="#06b6d4" stroke-width="0.5" opacity="0.8"/>
    <text x="12" y="18" fill="#67e8f9" font-size="10" font-weight="500">📖 read_file</text>
  </g>
  <g transform="translate(210,532)">
    <rect width="110" height="28" rx="6" fill="#0d1117" stroke="#06b6d4" stroke-width="0.5" opacity="0.8"/>
    <text x="12" y="18" fill="#67e8f9" font-size="10" font-weight="500">✏️ write_file</text>
  </g>
  <g transform="translate(334,532)">
    <rect width="118" height="28" rx="6" fill="#0d1117" stroke="#06b6d4" stroke-width="0.5" opacity="0.8"/>
    <text x="12" y="18" fill="#67e8f9" font-size="10" font-weight="500">📂 list_directory</text>
  </g>
  <g transform="translate(466,532)">
    <rect width="118" height="28" rx="6" fill="#0d1117" stroke="#06b6d4" stroke-width="0.5" opacity="0.8"/>
    <text x="12" y="18" fill="#67e8f9" font-size="10" font-weight="500">🔍 search_files</text>
  </g>
  <g transform="translate(598,532)">
    <rect width="118" height="28" rx="6" fill="#0d1117" stroke="#06b6d4" stroke-width="0.5" opacity="0.8"/>
    <text x="12" y="18" fill="#67e8f9" font-size="10" font-weight="500">⚡ run_command</text>
  </g>
  <g transform="translate(730,532)">
    <rect width="140" height="28" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="0.5" opacity="0.8"/>
    <text x="12" y="18" fill="#3fb950" font-size="10" font-weight="500">✅ task_complete</text>
  </g>

  <!-- Sandboxed execution note -->
  <text x="86" y="582" fill="#484f58" font-size="10">🔒 All operations sandboxed to workspaceRoot · Path traversal protection · Writes staged for HITL approval</text>

  <!-- ═══════════════ DATA LAYER ═══════════════ -->
  <!-- Arrow: Agents → Data -->
  <line x1="300" y1="607" x2="300" y2="640" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)" opacity="0.5"/>
  <line x1="660" y1="607" x2="660" y2="640" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)" opacity="0.5"/>

  <!-- PostgreSQL + pgvector -->
  <rect x="100" y="645" width="350" height="70" rx="10" fill="url(#dbGrad)" opacity="0.1" stroke="#ec4899" stroke-width="0.5"/>
  <text x="120" y="670" fill="#f9a8d4" font-size="12" font-weight="500">PostgreSQL + pgvector</text>
  <text x="120" y="686" fill="#8b949e" font-size="10">state_tickets · memory_tickets · workspace_files</text>
  <text x="120" y="700" fill="#8b949e" font-size="10">Semantic similarity search · Solution cache</text>

  <!-- User's Codebase -->
  <rect x="510" y="645" width="350" height="70" rx="10" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
  <text x="530" y="670" fill="#e6edf3" font-size="12" font-weight="500">User's Codebase</text>
  <text x="530" y="686" fill="#8b949e" font-size="10">Source files · Config · Tests · Infrastructure</text>
  <text x="530" y="700" fill="#8b949e" font-size="10">Auto-detected: runtime, framework, linter, DB</text>

  <!-- ═══════════════ TECH STACK BAR ═══════════════ -->
  <rect x="100" y="740" width="760" height="36" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="120" y="763" fill="#484f58" font-size="10" font-weight="500">STACK</text>
  <g transform="translate(160,748)">
    <rect width="50" height="20" rx="4" fill="#58a6ff" opacity="0.15"/>
    <text x="25" y="14" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="500">Bun</text>
  </g>
  <g transform="translate(220,748)">
    <rect width="55" height="20" rx="4" fill="#7c3aed" opacity="0.15"/>
    <text x="27" y="14" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="500">Hono</text>
  </g>
  <g transform="translate(285,748)">
    <rect width="55" height="20" rx="4" fill="#3fb950" opacity="0.15"/>
    <text x="27" y="14" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="500">Turbo</text>
  </g>
  <g transform="translate(350,748)">
    <rect width="85" height="20" rx="4" fill="#f97316" opacity="0.15"/>
    <text x="42" y="14" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="500">LangChain</text>
  </g>
  <g transform="translate(445,748)">
    <rect width="42" height="20" rx="4" fill="#ec4899" opacity="0.15"/>
    <text x="21" y="14" text-anchor="middle" fill="#f9a8d4" font-size="9" font-weight="500">Zod</text>
  </g>
  <g transform="translate(497,748)">
    <rect width="60" height="20" rx="4" fill="#06b6d4" opacity="0.15"/>
    <text x="30" y="14" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="500">Biome</text>
  </g>
  <g transform="translate(567,748)">
    <rect width="75" height="20" rx="4" fill="#ec4899" opacity="0.15"/>
    <text x="37" y="14" text-anchor="middle" fill="#f9a8d4" font-size="9" font-weight="500">pgvector</text>
  </g>
  <g transform="translate(652,748)">
    <rect width="60" height="20" rx="4" fill="#8b949e" opacity="0.15"/>
    <text x="30" y="14" text-anchor="middle" fill="#8b949e" font-size="9" font-weight="500">Docker</text>
  </g>
  <g transform="translate(722,748)">
    <rect width="120" height="20" rx="4" fill="#58a6ff" opacity="0.15"/>
    <text x="60" y="14" text-anchor="middle" fill="#79c0ff" font-size="9" font-weight="500">TypeScript (strict)</text>
  </g>

  <!-- ═══════════════ FLOW ARROWS (return paths) ═══════════════ -->
  <!-- SSE return: Engine → CLI -->
  <path d="M 860 295 Q 900 295 900 170 Q 900 110 780 110" fill="none" stroke="#3fb950" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrGreen)" opacity="0.4"/>
  <text x="907" y="200" fill="#3fb950" font-size="9" transform="rotate(90,907,200)" opacity="0.6">SSE events</text>

  <!-- HITL return: CLI → Engine approval -->
  <path d="M 860 334 Q 920 334 920 170 Q 920 100 780 100" fill="none" stroke="#d29922" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrYellow)" opacity="0.3"/>
  <text x="930" y="220" fill="#d29922" font-size="9" transform="rotate(90,930,220)" opacity="0.5">approve/reject</text>

  <!-- Copyright -->
  <text x="480" y="800" text-anchor="middle" fill="#30363d" font-size="10">cerebro · enterprise multi-agent orchestration</text>
</svg>